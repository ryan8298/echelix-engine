name: enrich

on:
  schedule:
    - cron: "0 8 * * *"   # 02:00 CST nightly
  workflow_dispatch:
    inputs:
      industry:
        description: Rotation bucket (utilities/oil_and_gas/...). Leave blank for all.
        required: false
        default: ""
      source_industry:
        description: Filter by raw Industry value (column Y in MAL).
        required: false
        default: ""
      vertical:
        description: Filter by raw Vertical value (column Z).
        required: false
        default: ""
      status:
        description: Status override (default — active/pending/out_of_rotation).
        required: false
        default: ""
      force:
        description: Ignore tier cadence (refresh everything in scope)
        type: boolean
        required: false
        default: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run Loop 1
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.industry }}" ]; then ARGS="$ARGS --industry=${{ github.event.inputs.industry }}"; fi
          if [ -n "${{ github.event.inputs.source_industry }}" ]; then ARGS="$ARGS --source-industry=${{ github.event.inputs.source_industry }}"; fi
          if [ -n "${{ github.event.inputs.vertical }}" ]; then ARGS="$ARGS --vertical=${{ github.event.inputs.vertical }}"; fi
          if [ -n "${{ github.event.inputs.status }}" ]; then ARGS="$ARGS --status=${{ github.event.inputs.status }}"; fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          pnpm enrich:loop -- $ARGS
