name: select

on:
  schedule:
    # 11:00 UTC = 05:00 CST, Mon–Fri (matches the rotation calendar)
    - cron: "0 11 * * 1-5"
  workflow_dispatch:
    inputs:
      industry:
        description: Override the calendar-derived industry
        required: false
        default: ""
      date:
        description: Override "today" (YYYY-MM-DD)
        required: false
        default: ""
      include_pending:
        description: Score pending accounts too (pre-gate testing)
        type: boolean
        required: false
        default: false
      top:
        description: Cap on picks (default 5)
        required: false
        default: "5"

jobs:
  select:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run Loop 2
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          ARGS="--top=${{ github.event.inputs.top || '5' }}"
          if [ -n "${{ github.event.inputs.industry }}" ]; then
            ARGS="$ARGS --industry=${{ github.event.inputs.industry }}"
          fi
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date=${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.include_pending }}" = "true" ]; then
            ARGS="$ARGS --include-pending"
          fi
          pnpm select -- $ARGS
